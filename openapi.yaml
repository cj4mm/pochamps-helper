openapi: 3.1.0
info:
  title: Pokemon Champions Helper API
  version: "1.0.12"
  description: Pokemon Champions OP.GG meta lookup, safe team selection, party building, and team analysis API.
servers:
  - url: https://pochamps-helper.onrender.com
paths:
  /pokemon/{name}/advice:
    get:
      operationId: getPokemonAdvice
      summary: Get Pokemon Champions battle advice for one Pokemon
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: battle_format
          in: query
          required: false
          schema:
            type: string
            default: single
      responses:
        "200":
          description: Pokemon battle advice response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pokemon:
                    type: string
                  ko_name:
                    type: string
                  slug:
                    type: string
                  representative_set:
                    type: object
                    properties:
                      label:
                        type: string
                      nature:
                        type: string
                      ability:
                        type: string
                      item:
                        type: string
                      moves:
                        type: array
                        items:
                          type: string
                      stat_allocation_label:
                        type: string
                      stat_allocation:
                        type: object
                        properties:
                          rate:
                            type: number
                          hp:
                            type: integer
                          atk:
                            type: integer
                          defense:
                            type: integer
                          spa:
                            type: integer
                          spd:
                            type: integer
                          spe:
                            type: integer
                          label:
                            type: string
                          note:
                            type: string
                      evidence:
                        type: object
                        properties:
                          moves:
                            type: array
                            items:
                              type: string
                          items:
                            type: array
                            items:
                              type: string
                          abilities:
                            type: array
                            items:
                              type: string
                          natures:
                            type: array
                            items:
                              type: string
                          stat_allocations:
                            type: array
                            items:
                              type: string
                  stat_allocations:
                    type: array
                    items:
                      type: object
                      properties:
                        rate:
                          type: number
                        hp:
                          type: integer
                        atk:
                          type: integer
                        defense:
                          type: integer
                        spa:
                          type: integer
                        spd:
                          type: integer
                        spe:
                          type: integer
                        label:
                          type: string
                        note:
                          type: string
                  stat_allocation_notes:
                    type: array
                    items:
                      type: string
                  threat_notes:
                    type: array
                    items:
                      type: string
                  counterplay:
                    type: array
                    items:
                      type: string
                  notes:
                    type: string
  /pokemon/{name}/profile:
    get:
      operationId: getPokemonProfile
      summary: Get derived role and type profile for one Pokemon
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: battle_format
          in: query
          required: false
          schema:
            type: string
            default: single
      responses:
        "200":
          description: Pokemon profile response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pokemon:
                    type: string
                  slug:
                    type: string
                  types:
                    type: array
                    items:
                      type: string
                  role_tags:
                    type: array
                    items:
                      type: string
                  weak_to:
                    type: array
                    items:
                      type: string
                  resists:
                    type: array
                    items:
                      type: string
                  immune_to:
                    type: array
                    items:
                      type: string
                  common_move_types:
                    type: array
                    items:
                      type: string
  /pokemon/available:
    get:
      operationId: listAvailablePokemon
      summary: List current candidate slugs used by the team builder
      responses:
        "200":
          description: Candidate slug list
          content:
            application/json:
              schema:
                type: object
                properties:
                  slugs:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  notes:
                    type: string
  /team/selection:
    post:
      operationId: recommendTeamSelection
      summary: Recommend 3 Pokemon selections from a 6 Pokemon team against opponent team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                my_team:
                  type: array
                  items:
                    type: string
                opponent_team:
                  type: array
                  items:
                    type: string
                refresh:
                  type: boolean
                  default: false
                battle_format:
                  type: string
                  default: single
                top_n:
                  type: integer
                  default: 3
              required:
                - my_team
                - opponent_team
      responses:
        "200":
          description: Team selection recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  input_my_team:
                    type: array
                    items:
                      type: string
                  input_opponent_team:
                    type: array
                    items:
                      type: string
                  my_team:
                    type: array
                    items:
                      type: string
                  opponent_team:
                    type: array
                    items:
                      type: string
                  recommended_selections:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        selection:
                          type: array
                          items:
                            type: string
                        lead:
                          type: string
                        score:
                          type: number
                        reason:
                          type: array
                          items:
                            type: string
                        risks:
                          type: array
                          items:
                            type: string
                  unavailable_pokemon:
                    type: object
                    properties:
                      my_team:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: string
                            slug:
                              type: string
                            reason:
                              type: string
                      opponent_team:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: string
                            slug:
                              type: string
                            reason:
                              type: string
                  candidate_policy:
                    type: string
                  notes:
                    type: string
  /team/build:
    post:
      operationId: buildRecommendedParty
      summary: Build a recommended 6 Pokemon party around selected core Pokemon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                core:
                  type: array
                  items:
                    type: string
                candidate_pool:
                  type: array
                  items:
                    type: string
                refresh:
                  type: boolean
                  default: false
                battle_format:
                  type: string
                  default: single
                party_size:
                  type: integer
                  default: 6
              required:
                - core
      responses:
        "200":
          description: Recommended party response
          content:
            application/json:
              schema:
                type: object
                properties:
                  core:
                    type: array
                    items:
                      type: string
                  recommended_party:
                    type: array
                    items:
                      type: string
                  candidate_count:
                    type: integer
                  unavailable_pokemon:
                    type: object
                    properties:
                      core:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: string
                            slug:
                              type: string
                            reason:
                              type: string
                      candidates:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: string
                            slug:
                              type: string
                            reason:
                              type: string
                  candidate_policy:
                    type: string
                  notes:
                    type: string
  /team/analyze:
    post:
      operationId: analyzeTeam
      summary: Analyze a 6 Pokemon team for roles, weaknesses, strengths, and suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                team:
                  type: array
                  items:
                    type: string
                refresh:
                  type: boolean
                  default: false
                battle_format:
                  type: string
                  default: single
              required:
                - team
      responses:
        "200":
          description: Team analysis response
          content:
            application/json:
              schema:
                type: object
                properties:
                  input_team:
                    type: array
                    items:
                      type: string
                  team:
                    type: array
                    items:
                      type: string
                  role_counts:
                    type: object
                    properties:
                      summary:
                        type: string
                  weakness_stack:
                    type: object
                    properties:
                      summary:
                        type: string
                  strengths:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  unavailable_pokemon:
                    type: array
                    items:
                      type: object
                      properties:
                        input:
                          type: string
                        slug:
                          type: string
                        reason:
                          type: string
                  candidate_policy:
                    type: string
                  notes:
                    type: string
